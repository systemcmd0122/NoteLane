<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="url(#bg)" opacity="0.15"/>
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="none" stroke="url(#bg)" stroke-width="2"/>
  <!-- Logo -->
  <rect x="100" y="140" width="64" height="200" rx="8" fill="#6366f1" opacity="0.9"/>
  <rect x="176" y="140" width="64" height="150" rx="8" fill="#6366f1" opacity="0.75"/>
  <rect x="252" y="140" width="64" height="172" rx="8" fill="#6366f1" opacity="0.6"/>
  <!-- Text -->
  <text x="360" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="bold" fill="#f1f5f9">NoteLane</text>
  <text x="360" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">Markdown 対応カンバンボード</text>
  <text x="360" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#64748b">完全無料・サーバー不要・ブラウザ完結</text>
  <!-- Features -->
  <rect x="100" y="400" width="140" height="40" rx="20" fill="#334155"/>
  <text x="170" y="426" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Drag &amp; Drop</text>
  <rect x="260" y="400" width="140" height="40" rx="20" fill="#334155"/>
  <text x="330" y="426" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Markdown</text>
  <rect x="420" y="400" width="140" height="40" rx="20" fill="#334155"/>
  <text x="490" y="426" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">多言語対応</text>
  <rect x="580" y="400" width="140" height="40" rx="20" fill="#334155"/>
  <text x="650" y="426" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">ダークモード</text>
  <!-- URL -->
  <text x="1040" y="510" font-family="system-ui, sans-serif" font-size="20" fill="#6366f1" text-anchor="end">notelane.app</text>
</svg>
